<style>
  :root{
    --bg:#232323; --card:#2b2b2b; --line:#3a3a3a; --field:#2b2b2b;
    --orange:#F68922; --ink:#1b1b1b; --paper:#f4f4f2; --muted:#9a9a9a; --gray:#4D4D4D;
    --green:#3fb27f; --green-press:#349d6e; --red:#e2674e; --red-bg:rgba(226,103,78,.12);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{background:var(--bg); color:var(--paper);
    font-family:"Calibri","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
    min-height:100dvh; padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}
  .wrap{max-width:460px; width:100%; margin:0 auto; padding:20px 22px 28px; display:flex; flex-direction:column; min-height:100dvh;}
  .top{display:flex; align-items:center; gap:12px; margin-bottom:18px;}
  .back{appearance:none; background:none; border:0; padding:8px; margin:-8px 0 -8px -8px; cursor:pointer; color:var(--paper); text-decoration:none; display:flex;}
  .mark{height:34px; width:auto;}
  .htitle{font-family:"Arial Narrow",Arial,sans-serif; font-weight:800; letter-spacing:.14em; text-transform:uppercase; font-size:17px;}
  .rule{height:6px; margin:0 0 26px; border-radius:4px; background:repeating-linear-gradient(135deg,var(--orange) 0 14px,#2b2b2b 14px 26px);}
  .lead{font-family:Georgia,serif; font-size:21px; margin:0 0 22px;}

  label{display:block; font-size:13px; font-weight:600; letter-spacing:.02em; color:var(--muted); text-transform:uppercase; margin-bottom:8px;}
  select{width:100%; appearance:none; background:var(--field); color:var(--paper); border:1.5px solid var(--line); border-radius:12px;
    padding:16px 15px; font-size:17px; font-family:inherit; padding-right:42px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' fill='none' stroke='%239a9a9a' stroke-width='2'><path d='M5 8l5 5 5-5'/></svg>");
    background-repeat:no-repeat; background-position:right 14px center;}
  select:focus{outline:none; border-color:var(--orange);}

  .whoami{display:flex; align-items:center; gap:8px; color:var(--muted); font-size:14px; margin-bottom:16px;}
  .whoami b{color:var(--paper);}
  .change{appearance:none; background:none; border:0; color:var(--orange); font-size:14px; font-family:inherit; cursor:pointer; padding:0; margin-left:auto; text-decoration:underline;}

  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:15px 16px; margin-bottom:12px; display:flex; align-items:center; gap:12px;}
  .card.late{background:var(--red-bg); border-color:rgba(226,103,78,.4);}
  .card .info{flex:1; min-width:0;}
  .card .nm{font-size:16px; font-weight:600; margin-bottom:3px;}
  .card .mt{font-size:13px; color:var(--muted); display:flex; align-items:center; gap:5px;}
  .card.late .mt{color:var(--red);}
  .ret{appearance:none; border:0; border-radius:11px; padding:12px 20px; font-size:15px; font-weight:700; font-family:inherit;
    background:var(--green); color:var(--ink); cursor:pointer; white-space:nowrap; transition:transform .06s, background .15s;}
  .ret:active{transform:scale(.96); background:var(--green-press);}

  .empty{text-align:center; color:var(--muted); padding:40px 10px;}
  .empty .big{font-family:Georgia,serif; font-size:22px; color:var(--paper); margin:14px 0 6px;}

  .home{appearance:none; border:2px solid var(--gray); background:transparent; color:var(--paper); border-radius:14px;
    padding:18px; font-size:17px; font-weight:600; font-family:inherit; cursor:pointer; text-decoration:none; text-align:center; display:block; margin-top:18px;}

  .toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
    background:var(--green); color:var(--ink); font-weight:700; padding:12px 18px; border-radius:12px; opacity:0; pointer-events:none; transition:.25s; font-size:14px;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>

      <span class="htitle">Return</span>
    </div>
    <div class="rule"></div>

    <!-- NAME SCREEN -->
    <div id="nameScreen">
      <p class="lead">Who's returning?</p>
      <label for="name">Your name</label>
      <select id="name">
        <option value="" selected disabled>Select your name</option>
        <option>Ray G.</option><option>James G.</option><option>Jennifer S.</option><option>Freddie</option><option>Pat D.</option>
      </select>
    </div>

    <!-- ITEMS SCREEN -->
    <div id="itemsScreen" style="display:none;">
      <div class="whoami">Returning as <b id="who"></b> <button class="change" id="change">change</button></div>
      <div id="list"></div>
      <a class="home" id="homeLink" href="#" style="display:none;">Done</a>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    // ---- Fill these in once they exist ----
    const LAUNCHER_URL = "index.html";        // launcher page address (back button + Done)
    const RETURN_WEBHOOK = "";      // n8n webhook that records the return
    // ----------------------------------------

    // Demo of what each person has out. Loaded live from the Checkouts tab once wired.
    const OUT = {
      "Ray G.": [
        {item:"Generators", dest:"Banner Island", out:3, late:false},
        {item:"16 ft Extension Ladder", dest:"Banner Island", out:1, late:false}
      ],
      "James G.": [
        {item:"2-Way Water Pumps", dest:"Yard", out:5, late:true}
      ],
      "Jennifer S.": [],
      "Freddie": [
        {item:"Walk Behind Cement Cutter (with 3 blades)", dest:"Shop", out:2, late:false}
      ],
      "Pat D.": [
        {item:"Large Squeegees", dest:"Yard", out:1, late:false}
      ]
    };

    if(LAUNCHER_URL){ document.getElementById('backLink').href=LAUNCHER_URL; document.getElementById('homeLink').href=LAUNCHER_URL; }
    let t; function toast(m){ const e=document.getElementById('toast'); e.textContent=m; e.classList.add('show'); clearTimeout(t); t=setTimeout(()=>e.classList.remove('show'),1700); }

    const nameSel=document.getElementById('name');
    const nameScreen=document.getElementById('nameScreen');
    const itemsScreen=document.getElementById('itemsScreen');
    const list=document.getElementById('list');
    let current=null;

    nameSel.addEventListener('change', ()=>{ current=nameSel.value; document.getElementById('who').textContent=current; render(); nameScreen.style.display='none'; itemsScreen.style.display='block'; });
    document.getElementById('change').addEventListener('click', ()=>{ itemsScreen.style.display='none'; nameScreen.style.display='block'; });

    function render(){
      const items = OUT[current] || [];
      list.innerHTML='';
      document.getElementById('homeLink').style.display='none';
      if(items.length===0){
        list.innerHTML = '<div class="empty"><svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#3fb27f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg><div class="big">All caught up</div><div>You don\'t have anything out right now.</div></div>';
        document.getElementById('homeLink').style.display='block';
        return;
      }
      items.forEach((it,idx)=>{
        const card=document.createElement('div'); card.className='card'+(it.late?' late':'');
        const meta = it.late ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg> Overdue \u00b7 out '+it.out+' days'
                            : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zM12 6v6l4 2"/></svg> '+it.dest+' \u00b7 out '+it.out+' day'+(it.out===1?'':'s');
        card.innerHTML='<div class="info"><div class="nm">'+it.item+'</div><div class="mt">'+meta+'</div></div>';
        const btn=document.createElement('button'); btn.className='ret'; btn.textContent='Return';
        btn.addEventListener('click', async ()=>{
          if(RETURN_WEBHOOK){
            try{ await fetch(RETURN_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({person:current, item:it.item, returnedAt:new Date().toISOString()})}); }
            catch(e){ toast("No signal, try again"); return; }
          }
          OUT[current].splice(idx,1); toast(it.item+' returned'); render();
        });
        card.appendChild(btn); list.appendChild(card);
      });
    }
  </script>
</body>
