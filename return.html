<style>
  :root{
    --bg:#232323; --card:#2b2b2b; --line:#3a3a3a; --field:#2b2b2b;
    --orange:#F68922; --orange-press:#d9760f;
    --ink:#1b1b1b; --paper:#f4f4f2; --muted:#9a9a9a; --gray:#4D4D4D;
    --green:#3fb27f; --green-press:#34a06f; --red:#e25c4e;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{background:var(--bg); color:var(--paper);
    font-family:"Calibri","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
    min-height:100dvh; padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}
  .wrap{max-width:460px; width:100%; margin:0 auto; padding:20px 22px 28px; display:flex; flex-direction:column; min-height:100dvh;}

  .top{display:flex; align-items:center; gap:12px; margin-bottom:18px;}
  .back{appearance:none; background:none; border:0; padding:8px; margin:-8px 0 -8px -8px; cursor:pointer; color:var(--paper); text-decoration:none; display:flex;}
  .mark{height:34px; width:auto;}
  .htitle{font-family:"Arial Narrow",Arial,sans-serif; font-weight:800; letter-spacing:.14em; text-transform:uppercase; font-size:17px;}
  .rule{height:6px; margin:0 0 26px; border-radius:4px;
    background:repeating-linear-gradient(135deg,var(--orange) 0 14px,#2b2b2b 14px 26px);}

  .lead{font-family:Georgia,serif; font-size:21px; margin:0 0 22px;}
  .field{margin-bottom:20px;}
  label{display:block; font-size:13px; font-weight:600; letter-spacing:.02em; color:var(--muted); text-transform:uppercase; margin-bottom:8px;}
  select{width:100%; appearance:none; background:var(--field); color:var(--paper);
    border:1.5px solid var(--line); border-radius:12px; padding:16px 15px; font-size:17px; font-family:inherit;}
  select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' fill='none' stroke='%239a9a9a' stroke-width='2'><path d='M5 8l5 5 5-5'/></svg>");
    background-repeat:no-repeat; background-position:right 14px center; padding-right:42px;}
  select:focus{outline:none; border-color:var(--orange);}

  .items{display:flex; flex-direction:column; gap:12px;}
  .item{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px;
    display:flex; justify-content:space-between; align-items:center; gap:12px;}
  .item.overdue{border-color:var(--red); background:rgba(226,92,78,.08);}
  .item .info{flex:1; min-width:0;}
  .item .nm{font-size:17px; font-weight:600; margin-bottom:4px; word-wrap:break-word;}
  .item .meta{font-size:13px; color:var(--muted);}
  .item.overdue .meta{color:var(--red); font-weight:600;}
  .ret{appearance:none; border:0; border-radius:12px; padding:14px 18px; font-size:15px; font-weight:700; font-family:inherit;
    background:var(--green); color:var(--ink); cursor:pointer; transition:transform .06s, background .15s; flex-shrink:0;}
  .ret:active{transform:scale(.95); background:var(--green-press);}
  .ret:disabled{opacity:.5; cursor:default;}

  .empty{text-align:center; color:var(--muted); padding:40px 20px; font-style:italic;}
  .empty.success{color:var(--green); font-style:normal;}

  .toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
    background:var(--orange); color:var(--ink); font-weight:700; padding:12px 18px; border-radius:12px;
    opacity:0; pointer-events:none; transition:.25s; font-size:14px; max-width:90vw; text-align:center;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .toast.green{background:var(--green);}
</style>

      <div class="htitle">Return</div>
    </div>
    <div class="rule"></div>

    <p class="lead">Return a tool</p>

    <div class="field">
      <label for="name">Your name</label>
      <select id="name">
        <option value="" selected disabled id="namePlaceholder">Loading…</option>
      </select>
    </div>

    <div id="itemsArea" style="display:none;">
      <label style="margin-bottom:12px;">What you have out</label>
      <div class="items" id="items"></div>
    </div>

    <div class="empty" id="emptyState" style="display:none;">Nothing checked out under that name.</div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    // ---- Webhook URLs ----
    const GET_LISTS_URL    = "https://haggertybuilds.app.n8n.cloud/webhook/shop-lists";
    const GET_MY_ITEMS_URL = "https://haggertybuilds.app.n8n.cloud/webhook/my-items";
    const RETURN_URL       = "https://haggertybuilds.app.n8n.cloud/webhook/record-return";
    // ----------------------

    let t;
    function toast(m, green){
      const e=document.getElementById('toast');
      e.textContent=m;
      e.classList.toggle('green', !!green);
      e.classList.add('show');
      clearTimeout(t);
      t=setTimeout(()=>e.classList.remove('show'),2200);
    }

    const fmt = d => {
      if(!d) return '';
      const dt = new Date(d);
      if(isNaN(dt)) return d;
      return dt.toLocaleDateString(undefined,{weekday:'short', month:'short', day:'numeric'});
    };
    const daysUntil = d => {
      if(!d) return null;
      const dt = new Date(d);
      if(isNaN(dt)) return null;
      const today = new Date(); today.setHours(0,0,0,0);
      dt.setHours(0,0,0,0);
      return Math.round((dt - today) / 86400000);
    };

    // 5-minute cache — reused across checkout and return pages
    const CACHE_KEY = 'haggerty_shop_lists_v1';
    const CACHE_MINUTES = 5;
    function readCache(){
      try{
        const raw = sessionStorage.getItem(CACHE_KEY);
        if(!raw) return null;
        const obj = JSON.parse(raw);
        if(Date.now() - (obj.savedAt||0) > CACHE_MINUTES*60*1000) return null;
        return obj.data;
      } catch(e){ return null; }
    }
    function writeCache(data){
      try{ sessionStorage.setItem(CACHE_KEY, JSON.stringify({savedAt: Date.now(), data})); } catch(e){}
    }

    function fillNames(data){
      const sel = document.getElementById('name');
      const ph = document.getElementById('namePlaceholder');
      if(ph) ph.textContent = 'Select your name';
      // Clear any names already added
      Array.from(sel.querySelectorAll('option')).forEach(o => { if(!o.disabled) o.remove(); });
      (data.people || []).forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.name;
        opt.textContent = p.name;
        sel.appendChild(opt);
      });
    }

    async function loadPeople(){
      // Instant fill from cache if available
      const cached = readCache();
      if(cached) fillNames(cached);
      // Fetch fresh in background so data stays live
      try{
        const res = await fetch(GET_LISTS_URL, {cache:'no-store'});
        const data = await res.json();
        writeCache(data);
        fillNames(data);
      } catch(e){
        if(!cached) toast('Could not load names');
      }
    }
    loadPeople();

    // Load items when name selected
    document.getElementById('name').addEventListener('change', async (e) => {
      const person = e.target.value;
      if(!person) return;
      await loadItems(person);
    });

    async function loadItems(person){
      const itemsArea = document.getElementById('itemsArea');
      const emptyState = document.getElementById('emptyState');
      const list = document.getElementById('items');
      list.innerHTML = '<div class="empty">Loading…</div>';
      itemsArea.style.display = 'block';
      emptyState.style.display = 'none';

      try{
        const url = GET_MY_ITEMS_URL + '?person=' + encodeURIComponent(person);
        const res = await fetch(url, {cache:'no-store'});
        const data = await res.json();
        renderItems(data.items || []);
      } catch(e){
        list.innerHTML = '<div class="empty">Could not load items. Try again.</div>';
      }
    }

    function renderItems(items){
      const list = document.getElementById('items');
      const itemsArea = document.getElementById('itemsArea');
      const emptyState = document.getElementById('emptyState');

      if(items.length === 0){
        itemsArea.style.display = 'none';
        emptyState.style.display = 'block';
        emptyState.classList.remove('success');
        return;
      }

      list.innerHTML = '';
      items.forEach(it => {
        const days = daysUntil(it.dueBack);
        const overdue = days !== null && days < 0;
        const card = document.createElement('div');
        card.className = 'item' + (overdue ? ' overdue' : '');

        let dueLabel = '';
        if(it.dueBack){
          if(overdue) dueLabel = 'Overdue · was due ' + fmt(it.dueBack);
          else if(days === 0) dueLabel = 'Due back today';
          else if(days === 1) dueLabel = 'Due back tomorrow';
          else dueLabel = 'Due back ' + fmt(it.dueBack);
        } else {
          dueLabel = 'No return date set';
        }

        card.innerHTML = `
          <div class="info">
            <div class="nm"></div>
            <div class="meta"></div>
          </div>
          <button class="ret">Return</button>
        `;
        card.querySelector('.nm').textContent = it.item;
        card.querySelector('.meta').textContent = dueLabel;

        const btn = card.querySelector('.ret');
        btn.addEventListener('click', async () => {
          if(btn.disabled) return;
          btn.disabled = true;
          btn.textContent = 'Returning…';
          try{
            const res = await fetch(RETURN_URL, {
              method:'POST',
              headers:{'Content-Type':'application/json'},
              body: JSON.stringify({checkoutId: it.checkoutId})
            });
            if(!res.ok) throw new Error('bad response');
            toast(it.item + ' returned', true);
            card.style.transition = 'opacity .3s, transform .3s';
            card.style.opacity = '0';
            card.style.transform = 'translateX(20px)';
            setTimeout(() => {
              card.remove();
              if(list.children.length === 0){
                itemsArea.style.display = 'none';
                emptyState.style.display = 'block';
                emptyState.classList.add('success');
                emptyState.textContent = "All caught up. Nothing else to return.";
              }
            }, 320);
          } catch(e){
            toast('Could not return, try again');
            btn.disabled = false;
            btn.textContent = 'Return';
          }
        });

        list.appendChild(card);
      });
    }
  </script>
</body>
</html>
