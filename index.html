<style>
  :root{
    --bg:#232323; --card:#2b2b2b; --line:#3a3a3a;
    --orange:#F68922; --orange-press:#d9760f;
    --ink:#1b1b1b; --paper:#f4f4f2; --muted:#9a9a9a; --gray:#4D4D4D;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg); color:var(--paper);
    font-family:"Calibri","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
    display:flex; flex-direction:column; min-height:100dvh;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .wrap{flex:1; display:flex; flex-direction:column; max-width:460px; width:100%; margin:0 auto; padding:32px 22px 20px;}
  .brand{display:flex; align-items:center; gap:14px; margin-bottom:6px;}
  .mark{height:52px; width:auto; flex:0 0 auto; display:block;}
  .wordmark{font-family:"Arial Narrow",Arial,sans-serif; font-weight:800; letter-spacing:.16em;
    font-size:26px; text-transform:uppercase; line-height:1;}
  .tagline{font-family:Georgia,"Times New Roman",serif; font-style:italic; color:var(--muted);
    font-size:14px; margin-top:3px; letter-spacing:.01em;}
  .rule{height:7px; margin:22px 0 28px; border-radius:4px;
    background:repeating-linear-gradient(135deg,var(--orange) 0 16px,#2b2b2b 16px 30px);}
  .lead{font-family:Georgia,serif; font-size:19px; color:var(--paper); margin:0 0 4px;}
  .sub{color:var(--muted); font-size:14px; margin:0 0 26px;}
  .actions{display:flex; flex-direction:column; gap:14px;}
  .btn{appearance:none; border:0; border-radius:16px; padding:24px 20px; font-size:19px; font-weight:700;
    font-family:inherit; display:flex; align-items:center; gap:14px; cursor:pointer; text-decoration:none;
    transition:transform .06s ease, background .15s ease;}
  .btn:active{transform:scale(.985);}
  .btn .ico{width:26px; height:26px; flex:0 0 auto;}
  .btn-out{background:var(--orange); color:var(--ink);}
  .btn-out:active{background:var(--orange-press);}
  .btn-in{background:transparent; color:var(--paper); border:2px solid var(--gray);}
  .btn-in:active{background:#333;}
  .btn small{display:block; font-weight:500; font-size:13px; opacity:.7; margin-top:2px;}
  .btn .txt{display:flex; flex-direction:column; line-height:1.15;}
  .foot{margin-top:auto; padding-top:26px; color:var(--muted); font-size:12.5px; text-align:center; line-height:1.5;}
  .tip{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px;
    color:var(--muted); font-size:13px; margin-top:20px; display:flex; gap:10px; align-items:flex-start;}
  .tip b{color:var(--paper); font-weight:600;}
  .tip .x{margin-left:auto; color:var(--muted); cursor:pointer; font-size:18px; line-height:1; padding:0 2px;}
  .toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
    background:var(--orange); color:var(--ink); font-weight:700; padding:12px 18px; border-radius:12px;
    opacity:0; pointer-events:none; transition:.25s; font-size:14px; max-width:90%;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  @media (prefers-reduced-motion:reduce){ .btn,.toast{transition:none;} }
</style>
</head>

    <div class="rule"></div>

    <p class="lead">What do you need to do?</p>
    <p class="sub">Pick one. It takes about fifteen seconds.</p>

    <div class="actions">
      <a class="btn btn-out" id="checkout" href="#">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="#1b1b1b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        <span class="txt">Check Out a Tool<small>Taking something from the shop</small></span>
      </a>
      <a class="btn btn-in" id="return" href="#">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="#f4f4f2" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>
        <span class="txt">Return a Tool<small>Bringing something back</small></span>
      </a>
    </div>

    <div class="tip" id="tip">
      <span id="tiptext"><b>Keep this handy:</b> add it to your home screen so it opens like an app.</span>
      <span class="x" onclick="document.getElementById('tip').style.display='none'">&times;</span>
    </div>

    <div class="foot">Haggerty Construction &middot; Stockton, CA</div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const CHECKOUT_URL = "checkout.html";   // paste n8n checkout form URL
    const RETURN_URL   = "return.html";   // paste n8n return form URL
    function wire(id,url){
      const el=document.getElementById(id);
      if(url){ el.href=url; }
      else el.addEventListener('click',e=>{ e.preventDefault(); toast("Link not set yet"); });
    }
    wire('checkout',CHECKOUT_URL); wire('return',RETURN_URL);
    let t; function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
      clearTimeout(t); t=setTimeout(()=>el.classList.remove('show'),1800); }
    const ios=/iphone|ipad|ipod/i.test(navigator.userAgent);
    document.getElementById('tiptext').innerHTML = ios
      ? "<b>Keep this handy:</b> tap Share, then <b>Add to Home Screen</b>."
      : "<b>Keep this handy:</b> open the menu, then <b>Add to Home screen</b>.";
  </script>
