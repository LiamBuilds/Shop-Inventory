<style>
  :root{
    --bg:#232323; --card:#2b2b2b; --line:#3a3a3a; --field:#2b2b2b;
    --orange:#F68922; --orange-press:#d9760f;
    --ink:#1b1b1b; --paper:#f4f4f2; --muted:#9a9a9a; --gray:#4D4D4D;
    --green:#3fb27f; --green-press:#349d6e;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{background:var(--bg); color:var(--paper);
    font-family:"Calibri","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
    min-height:100dvh; padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}
  .wrap{max-width:460px; width:100%; margin:0 auto; padding:20px 22px 28px; display:flex; flex-direction:column; min-height:100dvh;}

  .top{display:flex; align-items:center; gap:12px; margin-bottom:18px;}
  .back{appearance:none; background:none; border:0; padding:8px; margin:-8px 0 -8px -8px; cursor:pointer; color:var(--paper); text-decoration:none; display:flex;}
  .mark{height:34px; width:auto;}
  .htitle{font-family:"Arial Narrow",Arial,sans-serif; font-weight:800; letter-spacing:.14em; text-transform:uppercase; font-size:17px;}
  .rule{height:6px; margin:0 0 26px; border-radius:4px;
    background:repeating-linear-gradient(135deg,var(--orange) 0 14px,#2b2b2b 14px 26px);}

  .lead{font-family:Georgia,serif; font-size:21px; margin:0 0 22px;}
  .sub{color:var(--muted); font-size:14px; margin:-16px 0 22px;}

  /* Scan screen */
  .scanArea{display:flex; flex-direction:column; align-items:center; gap:20px; flex:1;}
  .scanFrame{width:100%; aspect-ratio:1; max-width:340px; border-radius:20px; overflow:hidden; background:#000; position:relative; border:2px solid var(--line);}
  #scanVideo{width:100%; height:100%; object-fit:cover; display:block;}
  .scanReticle{position:absolute; inset:14%; border:3px solid var(--orange); border-radius:14px; pointer-events:none;
    box-shadow:0 0 0 9999px rgba(0,0,0,.35);}
  .scanReticle::before, .scanReticle::after{content:""; position:absolute; width:24px; height:24px; border-color:var(--orange); border-style:solid; border-width:0;}
  .scanReticle::before{top:-3px; left:-3px; border-top-width:6px; border-left-width:6px; border-top-left-radius:14px;}
  .scanReticle::after{bottom:-3px; right:-3px; border-bottom-width:6px; border-right-width:6px; border-bottom-right-radius:14px;}
  .scanHint{color:var(--muted); font-size:14px; text-align:center; padding:0 12px;}
  .scanHint b{color:var(--paper); font-weight:600;}
  .scanFallback{appearance:none; background:transparent; border:0; color:var(--orange); font-size:14px; font-family:inherit;
    cursor:pointer; padding:8px; text-decoration:underline; margin-top:4px;}

  .permBox{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:20px; text-align:center;}
  .permBox h3{margin:0 0 8px; font-family:Georgia,serif; font-size:19px; color:var(--paper);}
  .permBox p{margin:0 0 16px; color:var(--muted); font-size:14px; line-height:1.45;}
  .permBox .btn{width:100%; padding:14px; border-radius:12px; background:var(--orange); color:var(--ink); border:0;
    font-size:16px; font-weight:700; font-family:inherit; cursor:pointer;}

  /* Form screen */
  .catBadge{display:flex; align-items:center; justify-content:space-between; gap:12px;
    background:rgba(246,137,34,.10); border:1px solid rgba(246,137,34,.35); border-radius:12px;
    padding:12px 14px; margin-bottom:24px;}
  .catInfo{display:flex; flex-direction:column; gap:2px; min-width:0;}
  .catLabel{font-size:11px; font-weight:700; letter-spacing:.08em; color:var(--orange);}
  .catValue{font-size:16px; font-weight:600; color:var(--paper); word-wrap:break-word;}
  .catChange{appearance:none; background:transparent; border:1.5px solid var(--gray); color:var(--paper);
    padding:8px 14px; border-radius:9px; font-size:13px; font-weight:600; font-family:inherit; cursor:pointer; flex-shrink:0;}

  .field{margin-bottom:20px;}
  label{display:block; font-size:13px; font-weight:600; letter-spacing:.02em; color:var(--muted); text-transform:uppercase; margin-bottom:8px;}
  select,input{width:100%; appearance:none; background:var(--field); color:var(--paper);
    border:1.5px solid var(--line); border-radius:12px; padding:16px 15px; font-size:17px; font-family:inherit;}
  select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' fill='none' stroke='%239a9a9a' stroke-width='2'><path d='M5 8l5 5 5-5'/></svg>");
    background-repeat:no-repeat; background-position:right 14px center; padding-right:42px;}
  select:focus, input:focus{outline:none; border-color:var(--orange);}

  .submit{appearance:none; border:0; border-radius:16px; padding:22px; font-size:19px; font-weight:700; font-family:inherit;
    background:var(--orange); color:var(--ink); cursor:pointer; width:100%; margin-top:6px; transition:transform .06s, background .15s;}
  .submit:active{transform:scale(.985); background:var(--orange-press);}
  .submit:disabled{opacity:.7; cursor:default;}

  /* Manual category picker overlay */
  .catOverlay{position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:50;
    display:none; align-items:flex-end; justify-content:center; padding:0;}
  .catOverlay.show{display:flex;}
  .catSheet{background:var(--bg); width:100%; max-width:460px; border-radius:20px 20px 0 0;
    padding:22px 20px calc(24px + env(safe-area-inset-bottom)); max-height:80vh; overflow-y:auto;}
  .catSheetTop{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;}
  .catSheetTitle{font-family:Georgia,serif; font-size:20px; color:var(--paper);}
  .catSheetClose{appearance:none; background:transparent; border:0; color:var(--muted); cursor:pointer; padding:4px;}
  .catList{display:flex; flex-direction:column; gap:8px;}
  .catBtn{appearance:none; background:var(--card); color:var(--paper); border:1.5px solid var(--line);
    border-radius:12px; padding:16px; font-size:16px; font-family:inherit; text-align:left; cursor:pointer;}
  .catBtn.active{border-color:var(--orange); background:rgba(246,137,34,.10);}

  /* Confirmation screen */
  .done{display:none; flex-direction:column; align-items:center; text-align:center; flex:1; justify-content:center; padding:20px 0;}
  .done.show{display:flex;}
  .check{width:84px; height:84px; border-radius:50%; background:rgba(63,178,127,.14); display:flex; align-items:center; justify-content:center; margin-bottom:22px;}
  .done h2{font-family:Georgia,serif; font-size:26px; margin:0 0 10px;}
  .done p{color:var(--paper); font-size:17px; margin:0 0 6px; line-height:1.45;}
  .done .meta{color:var(--muted); font-size:15px; margin-top:4px;}
  .done .acts{display:flex; flex-direction:column; gap:12px; width:100%; margin-top:34px;}
  .ghost{appearance:none; border:2px solid var(--gray); background:transparent; color:var(--paper);
    border-radius:14px; padding:18px; font-size:17px; font-weight:600; font-family:inherit; cursor:pointer; text-decoration:none; text-align:center;}
  .solid{appearance:none; border:0; background:var(--orange); color:var(--ink);
    border-radius:14px; padding:18px; font-size:17px; font-weight:700; font-family:inherit; cursor:pointer; text-decoration:none; text-align:center;}

  .toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
    background:var(--orange); color:var(--ink); font-weight:700; padding:12px 18px; border-radius:12px;
    opacity:0; pointer-events:none; transition:.25s; font-size:14px; max-width:90%; text-align:center;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>

      <span class="htitle">Check Out</span>
    </div>
    <div class="rule"></div>

    <!-- SCAN SCREEN -->
    <div id="scanScreen">
      <p class="lead">Scan the section QR</p>
      <p class="sub">Point your camera at the QR code on the shelf.</p>

      <div class="scanArea">
        <div id="scanPermPrompt" class="permBox" style="display:none;">
          <h3>Camera needed</h3>
          <p>Allow camera access to scan section codes. You can also pick a section manually.</p>
          <button class="btn" id="permBtn">Enable camera</button>
        </div>
        <div id="scanFrameWrap" class="scanFrame" style="display:none;">
          <video id="scanVideo" playsinline muted autoplay></video>
          <div class="scanReticle"></div>
        </div>
        <div id="scanHint" class="scanHint" style="display:none;">Line up the code inside the box</div>
        <button type="button" class="scanFallback" id="manualPick">Or pick a section manually</button>
      </div>
    </div>

    <!-- FORM SCREEN -->
    <div id="formScreen" style="display:none; flex-direction:column; flex:1;">
      <div class="catBadge">
        <div class="catInfo">
          <span class="catLabel">SECTION</span>
          <span class="catValue" id="catName"></span>
        </div>
        <button type="button" class="catChange" id="catChange">Change</button>
      </div>

      <div class="field">
        <label for="name">Your name</label>
        <select id="name">
          <option value="" selected disabled id="namePlaceholder">Loading…</option>
        </select>
      </div>

      <div class="field">
        <label for="tool">Which tool</label>
        <select id="tool">
          <option value="" selected disabled id="toolPlaceholder">Loading…</option>
        </select>
      </div>

      <div class="field">
        <label for="dest">Where's it going <span style="text-transform:none; font-weight:400; color:#777;">(optional)</span></label>
        <input id="dest" type="text" placeholder="Job site or yard" autocomplete="off">
      </div>

      <div class="field">
        <label for="dur">How long do you need it?</label>
        <select id="dur">
          <option value="0">Back today</option>
          <option value="1">1 day</option>
          <option value="3" selected>3 days</option>
          <option value="7">1 week</option>
          <option value="14">2 weeks</option>
        </select>
      </div>

      <button class="submit" id="submit">Check Out Tool</button>
    </div>

    <!-- CONFIRMATION SCREEN -->
    <div class="done" id="doneScreen">
      <div class="check">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#3fb27f" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
      <h2>Checked out</h2>
      <p id="doneLine"></p>
      <p class="meta" id="doneMeta"></p>
      <div class="acts">
        <button class="solid" id="another">Check out another</button>
        <a class="ghost" id="doneHome" href="index.html">Done</a>
      </div>
    </div>
  </main>

  <!-- Category picker overlay -->
  <div class="catOverlay" id="catOverlay">
    <div class="catSheet">
      <div class="catSheetTop">
        <div class="catSheetTitle">Pick a section</div>
        <button class="catSheetClose" onclick="document.getElementById('catOverlay').classList.remove('show');" aria-label="Close">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="catList" id="catList"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- QR scanner library (jsQR - lightweight, no build step needed) -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script>
    // ---- Webhooks ----
    const GET_LISTS_URL    = "https://haggertybuilds.app.n8n.cloud/webhook/shop-lists";
    const CHECKOUT_WEBHOOK = "https://haggertybuilds.app.n8n.cloud/webhook/record-checkout";
    // ------------------

    // Known section names (in case the tools API doesn't have them yet)
    const KNOWN_SECTIONS = ["Equipment","Ladders","Tools","Cleaning","Landscaping","Large Grey Bins","Pallets"];

    let t;
    function toast(m){
      const el=document.getElementById('toast'); el.textContent=m; el.classList.add('show');
      clearTimeout(t); t=setTimeout(()=>el.classList.remove('show'),1800);
    }
    const fmt = d => d.toLocaleDateString(undefined,{weekday:'short', month:'short', day:'numeric'});

    let cachedData = null;
    let activeCategory = "";

    // -------- Data loading --------
    const CACHE_KEY = 'haggerty_shop_lists_v1';
    const CACHE_MINUTES = 5;

    function readCache() {
      try {
        const raw = sessionStorage.getItem(CACHE_KEY);
        if (!raw) return null;
        const obj = JSON.parse(raw);
        const ageMs = Date.now() - (obj.savedAt || 0);
        if (ageMs > CACHE_MINUTES * 60 * 1000) return null;
        return obj.data;
      } catch(e) { return null; }
    }
    function writeCache(data) {
      try { sessionStorage.setItem(CACHE_KEY, JSON.stringify({ savedAt: Date.now(), data })); } catch(e) {}
    }

    function fillDropdownsFromData(data) {
      cachedData = data;
      const nameSel = document.getElementById('name');
      const namePh = document.getElementById('namePlaceholder');
      if (namePh) namePh.remove();
      // Clear any existing name options (except the placeholder-free default)
      Array.from(nameSel.querySelectorAll('option')).forEach(o => { if (!o.disabled) o.remove(); });
      (data.people || []).forEach(p => {
        const opt=document.createElement('option'); opt.value=p.name; opt.textContent=p.name;
        nameSel.appendChild(opt);
      });
      renderToolDropdown();
    }

    async function loadData() {
      // Instant fill from cache if available (5-minute freshness window)
      const cached = readCache();
      if (cached) {
        fillDropdownsFromData(cached);
      }
      // Always fetch fresh in the background so the sheet stays live
      try {
        const res = await fetch(GET_LISTS_URL, { cache:'no-store' });
        const data = await res.json();
        writeCache(data);
        fillDropdownsFromData(data);
      } catch(err) {
        if (!cached) toast('Could not load list — refresh');
      }
    }

    function renderToolDropdown() {
      const toolSel = document.getElementById('tool');
      const toolPh = document.getElementById('toolPlaceholder');
      if (toolPh) toolPh.remove();
      toolSel.innerHTML = '<option value="" selected disabled>Select a tool</option>';
      if (!cachedData) return;
      const tools = cachedData.tools || [];
      const filtered = activeCategory
        ? tools.filter(t => String(t.category||'').toLowerCase() === activeCategory.toLowerCase())
        : tools;
      if (filtered.length === 0) {
        const opt=document.createElement('option'); opt.disabled=true;
        opt.textContent = activeCategory ? 'No tools in this section yet' : 'No tools available';
        toolSel.appendChild(opt);
        return;
      }
      filtered.forEach(t => {
        const opt=document.createElement('option'); opt.value=t.item; opt.textContent=t.item;
        toolSel.appendChild(opt);
      });
    }

    // -------- Screen management --------
    function goToForm(section){
      activeCategory = section;
      document.getElementById('catName').textContent = section;
      document.getElementById('scanScreen').style.display = 'none';
      document.getElementById('formScreen').style.display = 'flex';
      stopScanner();
      renderToolDropdown();
    }

    function goToScan(){
      document.getElementById('formScreen').style.display = 'none';
      document.getElementById('doneScreen').classList.remove('show');
      document.getElementById('scanScreen').style.display = 'block';
      startScanner();
    }

    // -------- Manual picker --------
    function showManualPicker(){
      const overlay = document.getElementById('catOverlay');
      const list = document.getElementById('catList');
      list.innerHTML = '';
      // Prefer sections found in loaded data; fall back to known sections
      let sections = KNOWN_SECTIONS.slice();
      if (cachedData && (cachedData.tools||[]).some(t => t.category)) {
        sections = Array.from(new Set((cachedData.tools||[]).map(t => t.category).filter(Boolean))).sort();
      }
      sections.forEach(s => {
        const b=document.createElement('button');
        b.className = 'catBtn' + (s.toLowerCase()===activeCategory.toLowerCase()?' active':'');
        b.textContent = s;
        b.addEventListener('click', () => { overlay.classList.remove('show'); goToForm(s); });
        list.appendChild(b);
      });
      overlay.classList.add('show');
    }

    // -------- QR Scanner --------
    let stream = null;
    let scannerRunning = false;
    const video = document.getElementById('scanVideo');

    async function startScanner(){
      const permPrompt = document.getElementById('scanPermPrompt');
      const frameWrap = document.getElementById('scanFrameWrap');
      const hint = document.getElementById('scanHint');

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' },
          audio: false
        });
        video.srcObject = stream;
        await video.play();
        permPrompt.style.display = 'none';
        frameWrap.style.display = 'block';
        hint.style.display = 'block';
        scannerRunning = true;
        requestAnimationFrame(scanTick);
      } catch(err) {
        // Camera denied or unavailable
        permPrompt.style.display = 'block';
        frameWrap.style.display = 'none';
        hint.style.display = 'none';
      }
    }

    function stopScanner(){
      scannerRunning = false;
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
    }

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    function scanTick(){
      if (!scannerRunning) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        try {
          const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts:'dontInvert' });
          if (code && code.data) {
            let section = code.data.trim();
            // If the QR encoded a URL, extract just the section piece
            const m = section.match(/[?&]category=([^&]+)/i);
            if (m) section = decodeURIComponent(m[1]);
            // Sanity-check the value; if it doesn't look like a section, ignore
            if (section && section.length < 60) {
              toast('Scanned: ' + section);
              setTimeout(() => goToForm(section), 300);
              return;
            }
          }
        } catch(e) { /* keep trying */ }
      }
      requestAnimationFrame(scanTick);
    }

    // -------- Wiring --------
    document.getElementById('manualPick').addEventListener('click', showManualPicker);
    document.getElementById('permBtn').addEventListener('click', startScanner);
    document.getElementById('catChange').addEventListener('click', showManualPicker);
    document.getElementById('catOverlay').addEventListener('click', (e) => {
      if (e.target.id === 'catOverlay') e.currentTarget.classList.remove('show');
    });

    // Submit
    let submitting = false;
    document.getElementById('submit').addEventListener('click', async () => {
      if (submitting) return;
      const btn = document.getElementById('submit');
      const name = document.getElementById('name').value;
      const tool = document.getElementById('tool').value;
      const dest = document.getElementById('dest').value.trim();
      const days = parseInt(document.getElementById('dur').value,10);
      if(!name){ toast("Pick your name"); return; }
      if(!tool){ toast("Pick a tool"); return; }
      submitting = true; btn.disabled = true; btn.textContent = "Checking out…";
      const due = new Date(); due.setDate(due.getDate()+days);
      const payload = { person:name, tool, destination:dest, dueDate:due.toISOString().slice(0,10), checkedOutAt:new Date().toISOString(), section:activeCategory };
      if (CHECKOUT_WEBHOOK) {
        try { await fetch(CHECKOUT_WEBHOOK, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) }); }
        catch(e) { toast("No signal, try again"); submitting=false; btn.disabled=false; btn.textContent="Check Out Tool"; return; }
      }
      document.getElementById('doneLine').innerHTML = '<b>'+tool+'</b> is now out to '+name+'.';
      document.getElementById('doneMeta').textContent = (days===0?'Due back today':'Due back '+fmt(due)) + (dest?' \u00b7 '+dest:'');
      document.getElementById('formScreen').style.display = 'none';
      document.getElementById('doneScreen').classList.add('show');
      submitting = false; btn.disabled = false; btn.textContent = "Check Out Tool";
    });

    document.getElementById('another').addEventListener('click', () => {
      document.getElementById('name').selectedIndex = 0;
      document.getElementById('tool').selectedIndex = 0;
      document.getElementById('dest').value = '';
      document.getElementById('dur').value = '3';
      activeCategory = '';
      goToScan();
    });

    // Start
    loadData();
    startScanner();
  </script>
</body>
