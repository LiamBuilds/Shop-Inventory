<style>
  :root{
    --bg:#232323; --card:#2b2b2b; --line:#3a3a3a; --field:#2b2b2b;
    --orange:#F68922; --orange-press:#d9760f;
    --ink:#1b1b1b; --paper:#f4f4f2; --muted:#9a9a9a; --gray:#4D4D4D; --green:#3fb27f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{background:var(--bg); color:var(--paper);
    font-family:"Calibri","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
    min-height:100dvh; padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}
  .wrap{max-width:460px; width:100%; margin:0 auto; padding:20px 22px 28px; display:flex; flex-direction:column; min-height:100dvh;}

  .top{display:flex; align-items:center; gap:12px; margin-bottom:18px;}
  .back{appearance:none; background:none; border:0; padding:8px; margin:-8px 0 -8px -8px; cursor:pointer; color:var(--paper); text-decoration:none; display:flex;}
  .mark{height:34px; width:auto;}
  .htitle{font-family:"Arial Narrow",Arial,sans-serif; font-weight:800; letter-spacing:.14em; text-transform:uppercase; font-size:17px;}

  .rule{height:6px; margin:0 0 26px; border-radius:4px;
    background:repeating-linear-gradient(135deg,var(--orange) 0 14px,#2b2b2b 14px 26px);}

  .lead{font-family:Georgia,serif; font-size:21px; margin:0 0 22px;}
  .field{margin-bottom:20px;}
  label{display:block; font-size:13px; font-weight:600; letter-spacing:.02em; color:var(--muted); text-transform:uppercase; margin-bottom:8px;}
  label .opt{text-transform:none; font-weight:500; color:#777;}
  select,input{width:100%; appearance:none; background:var(--field); color:var(--paper);
    border:1.5px solid var(--line); border-radius:12px; padding:16px 15px; font-size:17px; font-family:inherit;}
  select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' fill='none' stroke='%239a9a9a' stroke-width='2'><path d='M5 8l5 5 5-5'/></svg>");
    background-repeat:no-repeat; background-position:right 14px center; padding-right:42px;}
  select:focus,input:focus{outline:none; border-color:var(--orange);}
  input::placeholder{color:#6f6f6f;}

  .submit{appearance:none; border:0; border-radius:16px; padding:22px; font-size:19px; font-weight:700; font-family:inherit;
    background:var(--orange); color:var(--ink); cursor:pointer; width:100%; margin-top:6px; transition:transform .06s, background .15s;}
  .submit:active{transform:scale(.985); background:var(--orange-press);}

  .toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
    background:#b3402e; color:#fff; font-weight:700; padding:12px 18px; border-radius:12px; opacity:0; pointer-events:none; transition:.25s; font-size:14px;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* confirmation screen */
  .done{display:none; flex-direction:column; align-items:center; text-align:center; flex:1; justify-content:center; padding:20px 0;}
  .done.show{display:flex;}
  .check{width:84px; height:84px; border-radius:50%; background:rgba(63,178,127,.14); display:flex; align-items:center; justify-content:center; margin-bottom:22px;}
  .done h2{font-family:Georgia,serif; font-size:26px; margin:0 0 10px;}
  .done p{color:var(--paper); font-size:17px; margin:0 0 6px; line-height:1.45;}
  .done .meta{color:var(--muted); font-size:15px; margin-top:4px;}
  .done .acts{display:flex; flex-direction:column; gap:12px; width:100%; margin-top:34px;}
  .ghost{appearance:none; border:2px solid var(--gray); background:transparent; color:var(--paper);
    border-radius:14px; padding:18px; font-size:17px; font-weight:600; font-family:inherit; cursor:pointer; text-decoration:none; text-align:center;}
  .solid{appearance:none; border:0; background:var(--orange); color:var(--ink);
    border-radius:14px; padding:18px; font-size:17px; font-weight:700; font-family:inherit; cursor:pointer; text-decoration:none; text-align:center;}
</style>
</head>

        <span class="htitle">Check Out</span>
      </div>
      <div class="rule"></div>

      <p class="lead">Grab a tool</p>

      <div class="field">
        <label for="name">Your name</label>
        <select id="name">
          <option value="" selected disabled>Select your name</option>
        <option value="" disabled id="namePlaceholder">Loading…</option>
</select>
      </div>

      <div class="field">
        <label for="tool">Which tool</label>
        <select id="tool">
          <option value="" selected disabled>Select a tool</option>
        <option value="" disabled id="toolPlaceholder">Loading…</option>
</select>
      </div>

      <div class="field">
        <label for="dest">Where's it going <span class="opt">(optional)</span></label>
        <input id="dest" type="text" placeholder="Job site or yard" autocomplete="off">
      </div>

      <div class="field">
        <label for="dur">How long do you need it?</label>
        <select id="dur">
          <option value="0">Back today</option>
          <option value="1">1 day</option>
          <option value="3" selected>3 days</option>
          <option value="7">1 week</option>
          <option value="14">2 weeks</option>
        </select>
      </div>

      <button class="submit" id="submit">Check Out Tool</button>
    </div>

    <!-- CONFIRMATION SCREEN -->
    <div class="done" id="doneScreen">
      <div class="check">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#3fb27f" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
      <h2>Checked out</h2>
      <p id="doneLine"></p>
      <p class="meta" id="doneMeta"></p>
      <div class="acts">
        <button class="solid" id="another">Check out another</button>
        <a class="ghost" id="doneHome" href="#">Done</a>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    // ---- Dropdown data feed (live from Excel via n8n) ----
    const GET_LISTS_URL = "https://haggertybuilds.app.n8n.cloud/webhook/shop-lists";

    async function loadDropdowns() {
      const nameSel = document.getElementById('name');
      const toolSel = document.getElementById('tool');
      try {
        const res = await fetch(GET_LISTS_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        // People dropdown
        const namePh = document.getElementById('namePlaceholder');
        if (namePh) namePh.remove();
        (data.people || []).forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.name;
          opt.textContent = p.name;
          nameSel.appendChild(opt);
        });

        // Tools dropdown — group by category if categories exist
        const toolPh = document.getElementById('toolPlaceholder');
        if (toolPh) toolPh.remove();
        const tools = data.tools || [];
        const byCat = {};
        tools.forEach(t => {
          const cat = t.category || 'Tools';
          (byCat[cat] = byCat[cat] || []).push(t);
        });
        Object.keys(byCat).sort().forEach(cat => {
          const group = document.createElement('optgroup');
          group.label = cat;
          byCat[cat].forEach(t => {
            const opt = document.createElement('option');
            opt.value = t.item;
            opt.textContent = t.item;
            group.appendChild(opt);
          });
          toolSel.appendChild(group);
        });
      } catch (err) {
        console.error('Could not load lists:', err);
        toast('Could not load list — refresh and try again');
      }
    }
    loadDropdowns();

    // ---- Fill these in once they exist ----
    const LAUNCHER_URL = "index.html";          // address of the Haggerty Shop Tools launcher page
    const CHECKOUT_WEBHOOK = "";      // n8n webhook that records the checkout
    // ----------------------------------------

    if(LAUNCHER_URL){ document.getElementById('backLink').href=LAUNCHER_URL; document.getElementById('doneHome').href=LAUNCHER_URL; }

    let t; function toast(m){ const e=document.getElementById('toast'); e.textContent=m; e.classList.add('show'); clearTimeout(t); t=setTimeout(()=>e.classList.remove('show'),1800); }
    const fmt = d => d.toLocaleDateString(undefined,{weekday:'short', month:'short', day:'numeric'});

    document.getElementById('submit').addEventListener('click', async () => {
      const name=document.getElementById('name').value;
      const tool=document.getElementById('tool').value;
      const dest=document.getElementById('dest').value.trim();
      const days=parseInt(document.getElementById('dur').value,10);
      if(!name){ toast("Pick your name"); return; }
      if(!tool){ toast("Pick a tool"); return; }
      const due=new Date(); due.setDate(due.getDate()+days);
      const payload={ person:name, tool, destination:dest, dueDate:due.toISOString().slice(0,10), checkedOutAt:new Date().toISOString() };

      if(CHECKOUT_WEBHOOK){
        try{ await fetch(CHECKOUT_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); }
        catch(e){ toast("No signal, try again"); return; }
      }

      document.getElementById('doneLine').innerHTML = '<b>'+tool+'</b> is now out to '+name+'.';
      document.getElementById('doneMeta').textContent = (days===0?'Due back today':'Due back '+fmt(due)) + (dest?' \u00b7 '+dest:'');
      document.getElementById('formScreen').style.display='none';
      document.getElementById('doneScreen').classList.add('show');
    });

    document.getElementById('another').addEventListener('click', () => {
      document.getElementById('name').selectedIndex=0;
      document.getElementById('tool').selectedIndex=0;
      document.getElementById('dest').value='';
      document.getElementById('dur').value='3';
      document.getElementById('doneScreen').classList.remove('show');
      document.getElementById('formScreen').style.display='flex';
      window.scrollTo(0,0);
    });
  </script>
</body>
</html>
